services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: express-api

    ports:
      - "3111:3111"

    environment:
      - NODE_ENV=development
      - PORT=3111

    volumes:
      - db-data:/app/data

    restart: unless-stopped

    mem_limit: 1024m

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3111/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3111
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  db-data:
