services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    container_name: express-api
    network_mode: host
    environment:
      - NODE_ENV=development
      - PORT=3111
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    mem_limit: 1024m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3111/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    env_file:
      - ./backend/.env

volumes:
  db-data:
